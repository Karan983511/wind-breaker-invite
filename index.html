<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WB Invite</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    a {
      padding: 15px 30px;
      background: rgba(0,0,0,0.7);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="center">
  <a href="https://discord.gg/YOUR_LINK">Join Server</a>
</div>

</body>
</html>
