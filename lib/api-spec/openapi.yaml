openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: views
    description: Page view counter
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /views:
    get:
      operationId: getViews
      tags: [views]
      summary: Get and increment view count
      description: Increments the page view counter and returns the new total
      responses:
        "200":
          description: Current view count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewCount"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ViewCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
